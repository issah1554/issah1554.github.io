<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="../assets/css/index.css">
    <link rel="stylesheet" href="../assets/css/tailwind.css">
</head>

<body>
    <app-layout>
        <app-navbar slot="sidebar"></app-navbar>
        <app-topbar slot="topbar" title="Profile" subtitle="Manage identity, access, and preferences."></app-topbar>
        <app-footer slot="footer" label="Profile sync active"></app-footer>

        <div class="mx-auto flex max-w-6xl flex-col gap-6">
            <section class="rounded-2xl border border-main-200 bg-main-50 p-6 shadow-sm">
                <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
                    <div class="flex items-center gap-4">
                        <div
                            class="flex h-16 w-16 items-center justify-center rounded-full bg-main-100 text-lg font-semibold text-main-600">
                            SI</div>
                        <div>
                            <h3 class="text-lg font-semibold text-main-900">Stephen IssaH</h3>
                            <p class="text-sm text-main-500">Product Owner • Dar es Salaam</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="rounded-full border border-main-300 px-4 py-2 text-sm text-main-700">Edit
                            profile</button>
                        <button class="rounded-full bg-main-900 px-4 py-2 text-sm text-main-50">Update photo</button>
                    </div>
                </div>
                <div class="mt-6 grid gap-4 sm:grid-cols-3">
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Role</p>
                        <p class="mt-2 text-base font-semibold text-main-900">Administrator</p>
                    </div>
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Team</p>
                        <p class="mt-2 text-base font-semibold text-main-900">Core Operations</p>
                    </div>
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Access</p>
                        <p class="mt-2 text-base font-semibold text-main-900">Full control</p>
                    </div>
                </div>
            </section>

            <section class="rounded-2xl border border-main-200 bg-main-50 p-6 shadow-sm">
                <div class="flex items-center justify-between gap-3">
                    <h3 class="text-lg font-semibold text-main-900">Account details</h3>
                    <button class="text-sm font-medium text-main-700">Change password</button>
                </div>
                <div class="mt-6 grid gap-4 sm:grid-cols-2">
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Email</p>
                        <p class="mt-2 text-sm font-semibold text-main-900">stephen.issah@example.com</p>
                    </div>
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Phone</p>
                        <p class="mt-2 text-sm font-semibold text-main-900">+255 700 000 000</p>
                    </div>
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Workspace</p>
                        <p class="mt-2 text-sm font-semibold text-main-900">Ops Console</p>
                    </div>
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Security</p>
                        <p class="mt-2 text-sm font-semibold text-main-900">2FA enabled</p>
                    </div>
                </div>
            </section>
        </div>
    </app-layout>

    <script type="module" src="../src/elements/layout/admin-dash-0/layout.js"></script>
</body>

</html>
