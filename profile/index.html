<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="../assets/css/index.css">
    <link rel="stylesheet" href="../assets/css/tailwind.css">
</head>

<body>
    <app-layout>
        <app-topbar slot="topbar" title="Profile" subtitle="Manage identity, access, and preferences."></app-topbar>
        <app-footer slot="footer" label="Profile sync active"></app-footer>

        <div class="mx-auto flex max-w-6xl flex-col gap-6">
            <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
                    <div class="flex items-center gap-4">
                        <div class="flex h-16 w-16 items-center justify-center rounded-full bg-slate-100 text-lg font-semibold text-slate-600">SI</div>
                        <div>
                            <h3 class="text-lg font-semibold text-slate-900">Stephen IssaH</h3>
                            <p class="text-sm text-slate-500">Product Owner • Dar es Salaam</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="rounded-full border border-slate-300 px-4 py-2 text-sm text-slate-700">Edit profile</button>
                        <button class="rounded-full bg-slate-900 px-4 py-2 text-sm text-white">Update photo</button>
                    </div>
                </div>
                <div class="mt-6 grid gap-4 sm:grid-cols-3">
                    <div class="rounded-xl border border-slate-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-slate-400">Role</p>
                        <p class="mt-2 text-base font-semibold text-slate-900">Administrator</p>
                    </div>
                    <div class="rounded-xl border border-slate-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-slate-400">Team</p>
                        <p class="mt-2 text-base font-semibold text-slate-900">Core Operations</p>
                    </div>
                    <div class="rounded-xl border border-slate-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-slate-400">Access</p>
                        <p class="mt-2 text-base font-semibold text-slate-900">Full control</p>
                    </div>
                </div>
            </section>

            <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                <div class="flex items-center justify-between gap-3">
                    <h3 class="text-lg font-semibold text-slate-900">Account details</h3>
                    <button class="text-sm font-medium text-slate-700">Change password</button>
                </div>
                <div class="mt-6 grid gap-4 sm:grid-cols-2">
                    <div class="rounded-xl border border-slate-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-slate-400">Email</p>
                        <p class="mt-2 text-sm font-semibold text-slate-900">stephen.issah@example.com</p>
                    </div>
                    <div class="rounded-xl border border-slate-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-slate-400">Phone</p>
                        <p class="mt-2 text-sm font-semibold text-slate-900">+255 700 000 000</p>
                    </div>
                    <div class="rounded-xl border border-slate-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-slate-400">Workspace</p>
                        <p class="mt-2 text-sm font-semibold text-slate-900">Ops Console</p>
                    </div>
                    <div class="rounded-xl border border-slate-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-slate-400">Security</p>
                        <p class="mt-2 text-sm font-semibold text-slate-900">2FA enabled</p>
                    </div>
                </div>
            </section>
        </div>
    </app-layout>

    <script type="module" src="../src/elements/layout/admin-dash-0/app-navbar.js"></script>
    <script type="module" src="../src/elements/layout/admin-dash-0/app-topbar.js"></script>
    <script type="module" src="../src/elements/layout/admin-dash-0/footer.js"></script>
    <script type="module" src="../src/elements/layout/admin-dash-0/layout.js"></script>
    <script type="module" src="../src/elements/layout/admin-dash-0/app-right-drawer.js"></script>
</body>

</html>
