<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="../../assets/css/index.css">
    <link rel="stylesheet" href="../../assets/css/tailwind.css">
</head>

<body class=" min-h-screen bg-accent-400 flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-2xl bg-primary-300 p-8 shadow-lg">
        <h1 class="mb-6 text-center text-2xl font-bold">Login</h1>
        <div class="flex flex-col gap-4">
            <app-input type="text" placeholder="Username" size="md" color="primary" variant="outline" rounded="md"></app-input>
            <app-input type="password" placeholder="Password" size="md" color="primary" variant="outline" rounded="md"></app-input>
            <app-button label="Login" color="accent" variant="solid" size="md" rounded="md" class="w-full"></app-button>
        </div>
        <div class="mt-4 flex justify-between text-sm text-gray-600">
            <a href="#" class="hover:underline">Forgot Password?</a>
            <a href="#" class="hover:underline">Sign Up</a>
        </div>
    </div>

    <script src="../../src/elements/ui/app-button.js"></script>
    <script src="../../src/elements/ui/app-input.js"></script>
</body>

</html>
