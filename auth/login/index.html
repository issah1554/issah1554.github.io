<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="../../assets/css/index.css">
    <link rel="stylesheet" href="../../assets/css/tailwind.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- Card Wrapper -->
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>

        <!-- Username Input -->
        <app-input type="text" placeholder="Username" size="md" color="primary" variant="outline" rounded="md"
            class="mb-4"></app-input>

        <!-- Password Input -->
        <app-input type="password" placeholder="Password" size="md" color="primary" variant="outline" rounded="md"
            class="mb-6"></app-input>

        <!-- Login Button -->
        <app-button label="Login" color="primary" variant="solid" size="md" rounded="md" class="w-full"></app-button>

        <!-- Optional Links -->
        <div class="flex justify-between mt-4 text-sm text-gray-600">
            <a href="#" class="hover:underline">Forgot Password?</a>
            <a href="#" class="hover:underline">Sign Up</a>
        </div>
    </div>

    <script src="./../../src/elements/ui/app-button.js"></script>
    <script src="./../../src/elements/ui/app-input.js"></script>
</body>

</html>
