<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/tailwind.css">
</head>

<body class="min-h-screen bg-primary-50 flex items-center justify-center p-4">
    <div class="w-full max-w-md rounded-2xl bg-main-50 p-8 shadow-lg border border-main-200">
        <div class="flex flex-col items-center">
            <img src="../../assets/img/logo.png" class="w-36 mb-4" alt="Logo">
            <h1 class="text-3xl font-bold mb-2 text-center text-main-800">Create Account</h1>
            <p class="text-center text-main-600 text-sm mb-6">Fill in the details below to register.</p>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                <app-input type="text" placeholder="First Name" size="lg" color="primary" variant="outline" rounded="md"
                    class="w-full"></app-input>
                <app-input type="text" placeholder="Last Name" size="lg" color="primary" variant="outline" rounded="md"
                    class="w-full"></app-input>
            </div>
            <app-input type="email" placeholder="Email" size="lg" color="primary" variant="outline" rounded="md"
                class="w-full"></app-input>
            <app-input type="password" placeholder="Password" size="lg" color="primary" variant="outline" rounded="md"
                class="w-full"></app-input>
            <app-input type="password" placeholder="Confirm Password" size="lg" color="primary" variant="outline"
                rounded="md" class="w-full"></app-input>
        </div>

        <div class="flex items-center mt-4 text-sm text-main-600">
            <label class="flex items-center gap-2">
                <input type="checkbox" class="h-4 w-4 accent-primary-500 border border-primary-400 rounded">
                I agree to the <a href="#" class="text-primary-500 hover:underline">Terms & Conditions</a>
            </label>
        </div>

        <div class="mt-6">
            <app-button label="Register" color="primary" variant="solid" size="md" rounded="md"
                class="w-full"></app-button>
        </div>

        <p class="text-center text-main-600 text-sm mt-6">
            Already have an account?
            <a href="/auth/login" class="hover:underline text-primary-500 font-medium">Login</a>
        </p>
    </div>

    <script src="../../src/elements/ui/app-button.js"></script>
    <script src="../../src/elements/ui/app-input.js"></script>
</body>

</html>
