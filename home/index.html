<!DOCTYPE html>
<html>

<head>
    <title>HTML Custom Elements</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css">
</head>

<body>
    <app-layout>
        <app-navbar slot="sidebar"></app-navbar>
        <app-topbar slot="topbar"></app-topbar>
        <app-footer slot="footer" label="Lab telemetry up to date"></app-footer>

        <app-button label="Save" rounded="none"></app-button>
        <app-button label="Delete" color="error" variant="solid" size="md" rounded="none"></app-button>
        <app-button label="Info" color="info" variant="outline" size="sm" rounded="full"></app-button>
        <app-button label="Accent" color="info" variant="solid"></app-button>

        <br>
        <user-avatar src="" alt="Stephen IssaH" size="60" status="online" rounded="full"></user-avatar>
        <user-avatar src="https://avatars.githubusercontent.com/u/153155657?v=4" alt="Stephen IssaH" initials="SI" size="70" status="pending"></user-avatar>
        <user-avatar src="https://avatars.githubusercontent.com/u/153155657?v=4" alt="Stephen IssaH" size="120" status="online" show-edit-button="true"></user-avatar>
    </app-layout>

    <script src="../src/elements/ui/app-button.js"></script>
    <script type="module" src="../src/elements/ui/user-avatar.js"></script>
    <script type="module" src="../src/elements/layout/admin-dash-0/layout.js"></script>
</body>

</html>
