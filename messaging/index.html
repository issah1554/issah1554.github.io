<!DOCTYPE html>
<html>

<head>
    <title>Home</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css">
    <style>
        :root {
            --ink: #0f172a;
            --mist: #e2e8f0;
            --sea: #0ea5a6;
            --sun: #f97316;
            --cloud: #f8fafc;
            --stone: #1e293b;
        }

        body {
            font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
            background:
                radial-gradient(circle at top, rgba(14, 165, 166, 0.12), transparent 55%),
                radial-gradient(circle at 10% 25%, rgba(249, 115, 22, 0.14), transparent 45%),
                linear-gradient(180deg, #f1f5f9 0%, #ffffff 100%);
            color: var(--ink);
        }

        .dash-fade {
            animation: dash-fade-up 0.8s ease both;
        }

        .dash-delay-1 {
            animation-delay: 0.15s;
        }

        .dash-delay-2 {
            animation-delay: 0.3s;
        }

        .dash-delay-3 {
            animation-delay: 0.45s;
        }

        .dash-float {
            animation: dash-float 7s ease-in-out infinite;
        }

        .dash-pop {
            animation: dash-pop 0.9s ease both;
        }

        .dash-delay-4 {
            animation-delay: 0.6s;
        }

        .dash-delay-5 {
            animation-delay: 0.75s;
        }

        @keyframes dash-fade-up {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes dash-float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes dash-pop {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <app-layout>
        <app-navbar slot="sidebar"></app-navbar>
        <app-topbar slot="topbar"></app-topbar>
        <app-footer slot="footer" label="Lab telemetry up to date"></app-footer>

        <div class=" mx-auto px-4 pb-16">
            <section class="dash-fade dash-delay-1 mb-6">
                <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                    <div>
                        <p class="text-sm uppercase tracking-[0.3em] text-main-500">Messaging Center</p>
                    </div>
                </div>
            </section>

            <nav class="mx-auto grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 xxl:grid-cols-5">

                <!-- WhatsApp -->
                <a href="/messaging/whatsapp/"
                    class="dash-pop dash-delay-2 group w-full max-w-sm rounded-3xl bg-main-0/90 p-6 shadow-xl shadow-slate-200/70 ring-1 ring-slate-200 transition hover:-translate-y-1 hover:shadow-2xl">
                    <div class="flex items-center justify-between">
                        <i class="bi bi-whatsapp text-4xl text-green-600"></i>
                        <span
                            class="rounded-full bg-emerald-100 px-2 py-1 text-xs font-semibold text-emerald-700">Live</span>
                    </div>
                    <h2 class="mt-4 text-2xl font-semibold text-main-900">WhatsApp</h2>
                    <div class="mt-6 flex items-center justify-between text-sm text-main-500">
                        <span>Open channel</span>
                        <span class="text-lg text-main-900 group-hover:translate-x-1 transition">→</span>
                    </div>
                </a>

                <!-- SMS -->
                <a href="/messaging/sms/"
                    class="dash-pop dash-delay-3 group w-full max-w-sm rounded-3xl bg-main-0/90 p-6 shadow-xl shadow-slate-200/70 ring-1 ring-slate-200 transition hover:-translate-y-1 hover:shadow-2xl">
                    <div class="flex items-center justify-between">
                        <i class="bi bi-chat-dots text-4xl text-blue-600"></i>
                        <span
                            class="rounded-full bg-main-100 px-2 py-1 text-xs font-semibold text-main-600">Queued</span>
                    </div>
                    <h2 class="mt-4 text-2xl font-semibold text-main-900">SMS</h2>
                    <div class="mt-6 flex items-center justify-between text-sm text-main-500">
                        <span>Open channel</span>
                        <span class="text-lg text-main-900 group-hover:translate-x-1 transition">→</span>
                    </div>
                </a>

                <!-- Email -->
                <a href="/messaging/email/"
                    class="dash-pop dash-delay-4 group w-full max-w-sm rounded-3xl bg-main-0/90 p-6 shadow-xl shadow-slate-200/70 ring-1 ring-slate-200 transition hover:-translate-y-1 hover:shadow-2xl">
                    <div class="flex items-center justify-between">
                        <i class="bi bi-envelope text-4xl text-amber-600"></i>
                        <span
                            class="rounded-full bg-amber-100 px-2 py-1 text-xs font-semibold text-amber-700">Drafts</span>
                    </div>
                    <h2 class="mt-4 text-2xl font-semibold text-main-900">Email</h2>
                    <div class="mt-6 flex items-center justify-between text-sm text-main-500">
                        <span>Open channel</span>
                        <span class="text-lg text-main-900 group-hover:translate-x-1 transition">→</span>
                    </div>
                </a>

                <!-- Forms -->
                <a href="/messaging/forms/"
                    class="dash-pop dash-delay-5 group w-full max-w-sm rounded-3xl bg-main-0/90 p-6 shadow-xl shadow-slate-200/70 ring-1 ring-slate-200 transition hover:-translate-y-1 hover:shadow-2xl">
                    <div class="flex items-center justify-between">
                        <i class="bi bi-ui-checks text-4xl text-blue-600"></i>
                        <span
                            class="rounded-full bg-blue-100 px-2 py-1 text-xs font-semibold text-blue-700">Active</span>
                    </div>
                    <h2 class="mt-4 text-2xl font-semibold text-main-900">Forms</h2>
                    <div class="mt-6 flex items-center justify-between text-sm text-main-500">
                        <span>Open channel</span>
                        <span class="text-lg text-main-900 group-hover:translate-x-1 transition">→</span>
                    </div>
                </a>

                <!-- In-app -->
                <a href="/messaging/in-app/"
                    class="dash-pop dash-delay-5 group w-full max-w-sm rounded-3xl bg-main-0/90 p-6 shadow-xl shadow-slate-200/70 ring-1 ring-slate-200 transition hover:-translate-y-1 hover:shadow-2xl">
                    <div class="flex items-center justify-between">
                        <i class="bi bi-phone text-4xl text-rose-600"></i>
                        <span class="rounded-full bg-rose-100 px-2 py-1 text-xs font-semibold text-rose-700">Beta</span>
                    </div>
                    <h2 class="mt-4 text-2xl font-semibold text-main-900">In-app</h2>
                    <div class="mt-6 flex items-center justify-between text-sm text-main-500">
                        <span>Open channel</span>
                        <span class="text-lg text-main-900 group-hover:translate-x-1 transition">→</span>
                    </div>
                </a>

            </nav>
        </div>
    </app-layout>

    <script src="../src/elements/ui/app-button.js"></script>
    <script type="module" src="../src/elements/layout/admin-dash-0/layout.js"></script>
    <script type="module" src="../src/elements/ui/user-avatar.js"></script>
</body>

</html>
