<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups</title>
    <link rel="stylesheet" href="../../assets/css/tailwind.css">
</head>

<body class="groups-page">
    <style>
        .groups-page .section-animate {
            opacity: 0;
            transform: translateY(16px);
            animation: pageFadeSlide 0.6s ease-out forwards;
        }

        .groups-page .section-animate:nth-of-type(1) {
            animation-delay: 0.05s;
        }

        .groups-page .section-animate:nth-of-type(2) {
            animation-delay: 0.15s;
        }

        @keyframes pageFadeSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <app-layout>
        <app-navbar slot="sidebar"></app-navbar>
        <app-topbar slot="topbar" title="Groups" subtitle="Organize contacts by category."></app-topbar>
        <app-footer slot="footer" label="Group categories loaded"></app-footer>

        <div class="mx-auto flex max-w-6xl flex-col gap-6">
            <section class="section-animate rounded-2xl border border-main-200 bg-main-100 p-6 shadow-sm">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-main-900">Contact Groups</h3>
                        <p class="text-sm text-main-500">Quick access to curated lists.</p>
                    </div>
                    <button class="rounded-xl bg-main-900 px-4 py-2 text-sm text-main-50">Create group</button>
                </div>
                <div class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                    <div class="rounded-xl border border-emerald-200 bg-emerald-50 p-4">
                        <p class="text-xs font-semibold uppercase tracking-widest text-black">Family</p>
                        <p class="mt-2 text-sm text-main-700">12 contacts</p>
                    </div>
                    <div class="rounded-xl border border-sky-200 bg-sky-50 p-4">
                        <p class="text-xs font-semibold uppercase tracking-widest text-black">Work</p>
                        <p class="mt-2 text-sm text-main-700">28 contacts</p>
                    </div>
                    <div class="rounded-xl border border-amber-200 bg-amber-50 p-4">
                        <p class="text-xs font-semibold uppercase tracking-widest text-black">VIP</p>
                        <p class="mt-2 text-sm text-main-700">5 contacts</p>
                    </div>
                    <div class="rounded-xl border border-rose-200 bg-rose-50 p-4">
                        <p class="text-xs font-semibold uppercase tracking-widest text-black">Vendors</p>
                        <p class="mt-2 text-sm text-main-700">9 contacts</p>
                    </div>
                    <div class="rounded-xl border border-indigo-200 bg-indigo-50 p-4">
                        <p class="text-xs font-semibold uppercase tracking-widest text-black">Leads</p>
                        <p class="mt-2 text-sm text-main-700">21 contacts</p>
                    </div>
                    <div class="rounded-xl border border-lime-200 bg-lime-50 p-4">
                        <p class="text-xs font-semibold uppercase tracking-widest text-black">Newsletter</p>
                        <p class="mt-2 text-sm text-main-700">32 contacts</p>
                    </div>
                </div>
            </section>

            <section class="section-animate rounded-2xl border border-main-200 bg-main-100 p-6 shadow-sm">
                <div class="flex items-center justify-between gap-3">
                    <h3 class="text-lg font-semibold text-main-900">Group Directory</h3>
                    <a href="../users/index.html" class="text-sm text-main-500 hover:text-main-700">Back to users</a>
                </div>
                <div class="mt-4 overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-xs uppercase tracking-widest text-main-400">
                            <tr>
                                <th class="py-2">Group</th>
                                <th class="py-2">Members</th>
                                <th class="py-2">Updated</th>
                                <th class="py-2 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody class="text-main-700">
                            <tr class="border-t border-main-200">
                                <td class="py-3 font-medium">Family</td>
                                <td class="py-3">12</td>
                                <td class="py-3">Today</td>
                                <td class="py-3 text-right">
                                    <button class="rounded-full bg-main-900 px-3 py-1 text-xs text-main-50">View</button>
                                </td>
                            </tr>
                            <tr class="border-t border-main-200">
                                <td class="py-3 font-medium">Work</td>
                                <td class="py-3">28</td>
                                <td class="py-3">2 days ago</td>
                                <td class="py-3 text-right">
                                    <button class="rounded-full bg-main-900 px-3 py-1 text-xs text-main-50">View</button>
                                </td>
                            </tr>
                            <tr class="border-t border-main-200">
                                <td class="py-3 font-medium">VIP</td>
                                <td class="py-3">5</td>
                                <td class="py-3">Yesterday</td>
                                <td class="py-3 text-right">
                                    <button class="rounded-full bg-main-900 px-3 py-1 text-xs text-main-50">View</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </app-layout>

    <script type="module" src="../../src/elements/layout/admin-dash-0/layout.js"></script>
</body>

</html>
