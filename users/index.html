<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css">
</head>

<body>
    <app-layout>
        <app-navbar slot="sidebar"></app-navbar>
        <app-topbar slot="topbar" title="Users" subtitle="Manage team access and roles."></app-topbar>
        <app-footer slot="footer" label="User directory synchronized"></app-footer>

        <div class="mx-auto flex max-w-6xl flex-col gap-6">
            <section class="rounded-2xl border border-main-200 bg-main-50 p-6 shadow-sm">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-main-900">Contacts</h3>
                    </div>
                    <div class="flex flex-wrap items-center gap-3">
                        <input id="searchInput" type="search" placeholder="Search users"
                            class="w-60 rounded-full border border-main-200 px-4 py-2 text-sm text-main-700">
                        <!-- <button
                           class="rounded-full border border-main-300 px-4 py-2 text-sm text-main-700">Roles</button>  -->
                        <button id="addContactButton"
                            class="rounded-full bg-main-900 px-4 py-2 text-sm text-main-50">Add Contacts</button>
                    </div>
                </div>
                <div class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Total contacts</p>
                        <p id="totalContacts" class="mt-2 text-2xl font-semibold text-main-900">0</p>
                    </div>
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Total phoneNumbers</p>
                        <p id="totalPhones" class="mt-2 text-2xl font-semibold text-main-900">0</p>
                    </div>
                    <div class="rounded-xl border border-main-200 p-4">
                        <p class="text-xs uppercase tracking-widest text-main-400">Emails</p>
                        <p id="totalEmails" class="mt-2 text-2xl font-semibold text-main-900">0</p>
                    </div>
                </div>
            </section>

            <section class="rounded-2xl border border-main-200 bg-main-50 p-6 shadow-sm">
                <div class="flex items-center justify-between gap-3">
                    <h3 class="text-lg font-semibold text-main-900">Users</h3>
                </div>
                <div class="mt-4 overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-xs uppercase tracking-widest text-main-400">
                            <tr>
                                <th class="py-2">Name</th>
                                <th class="py-2">PhoneNumber</th>
                                <th class="py-2">Email</th>
                                <th class="py-2 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="contactsTable" class="text-main-700"></tbody>
                    </table>
                </div>
            </section>

        </div>
    </app-layout>

    <app-modal id="viewModal" size="sm">
        <div class="rounded-2xl border border-main-200 bg-main-50 p-6 shadow-xl">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h4 class="text-lg font-semibold text-main-900">Contact details</h4>
                    <p class="text-sm text-main-500">Read-only view.</p>
                </div>
                <button class="text-sm text-main-400" onclick="closeModal('viewModal')">Close</button>
            </div>
            <div class="mt-4 space-y-3 text-sm text-main-700">
                <div>
                    <p class="text-xs uppercase tracking-widest text-main-400">Name</p>
                    <p id="viewName" class="mt-1 font-medium text-main-900"></p>
                </div>
                <div>
                    <p class="text-xs uppercase tracking-widest text-main-400">Phone</p>
                    <p id="viewPhone" class="mt-1 font-medium text-main-900"></p>
                </div>
                <div>
                    <p class="text-xs uppercase tracking-widest text-main-400">Email</p>
                    <p id="viewEmail" class="mt-1 font-medium text-main-900"></p>
                </div>
            </div>
        </div>
    </app-modal>

    <app-modal id="editModal" size="sm">
        <div class="rounded-2xl border border-main-200 bg-main-100 p-6 shadow-xl">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h4 class="text-lg font-semibold text-main-900">Edit contact</h4>
                    <p class="text-sm text-main-500">Update details for this contact.</p>
                </div>
                <button class="text-sm text-main-400" onclick="closeModal('editModal')">Close</button>
            </div>
            <form id="editForm" class="mt-4 space-y-3">
                <label class="block text-xs uppercase tracking-widest text-main-400">
                    Name
                    <input id="editName" type="text"
                        class="mt-1 w-full rounded-xl border border-main-200 px-3 py-2 text-sm text-main-700">
                </label>
                <label class="block text-xs uppercase tracking-widest text-main-400">
                    Phone
                    <input id="editPhone" type="text"
                        class="mt-1 w-full rounded-xl border border-main-200 px-3 py-2 text-sm text-main-700">
                </label>
                <label class="block text-xs uppercase tracking-widest text-main-400">
                    Email
                    <input id="editEmail" type="email"
                        class="mt-1 w-full rounded-xl border border-main-200 px-3 py-2 text-sm text-main-700">
                </label>
                <div class="flex items-center justify-end gap-2 pt-2">
                    <button type="button" onclick="closeModal('editModal')"
                        class="rounded-full border border-main-200 px-4 py-2 text-xs text-main-700">Cancel</button>
                    <button type="submit"
                        class="rounded-full bg-main-900 px-4 py-2 text-xs text-main-50">Save</button>
                </div>
            </form>
        </div>
    </app-modal>

    <app-modal id="addModal" size="sm">
        <div class="rounded-2xl border border-main-200 bg-main-100 p-6 shadow-xl">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h4 class="text-lg font-semibold text-main-900">Add contact</h4>
                    <p class="text-sm text-main-500">Create a new contact in your list.</p>
                </div>
                <button class="text-sm text-main-400" onclick="closeModal('addModal')">Close</button>
            </div>
            <form id="addForm" class="mt-4 space-y-3">
                <label class="block text-xs uppercase tracking-widest text-main-400">
                    Name
                    <input id="addName" type="text"
                        class="mt-1 w-full rounded-xl border border-main-200 px-3 py-2 text-sm text-main-700">
                </label>
                <label class="block text-xs uppercase tracking-widest text-main-400">
                    Phone
                    <input id="addPhone" type="text"
                        class="mt-1 w-full rounded-xl border border-main-200 px-3 py-2 text-sm text-main-700">
                </label>
                <label class="block text-xs uppercase tracking-widest text-main-400">
                    Email
                    <input id="addEmail" type="email"
                        class="mt-1 w-full rounded-xl border border-main-200 px-3 py-2 text-sm text-main-700">
                </label>
                <div class="flex items-center justify-end gap-2 pt-2">
                    <button type="button" onclick="closeModal('addModal')"
                        class="rounded-full border border-main-200 px-4 py-2 text-xs text-main-700">Cancel</button>
                    <button type="submit"
                        class="rounded-full bg-main-900 px-4 py-2 text-xs text-main-50">Add</button>
                </div>
            </form>
        </div>
    </app-modal>

    <app-modal id="deleteModal" size="sm">
        <div class="rounded-2xl border border-main-200 bg-main-50 p-6 shadow-xl">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h4 class="text-lg font-semibold text-main-900">Delete contact</h4>
                    <p class="text-sm text-main-500">This action cannot be undone.</p>
                </div>
                <button class="text-sm text-main-400" onclick="closeModal('deleteModal')">Close</button>
            </div>
            <p id="deleteMessage" class="mt-4 text-sm text-main-700"></p>
            <div class="mt-6 flex items-center justify-end gap-2">
                <button type="button" onclick="closeModal('deleteModal')"
                    class="rounded-full border border-main-200 px-4 py-2 text-xs text-main-700">Cancel</button>
                <button type="button" onclick="confirmDelete()"
                    class="rounded-full bg-red-600 px-4 py-2 text-xs text-white">Delete</button>
            </div>
        </div>
    </app-modal>

    <script>
        const storageKey = "contacts";
        const defaultContacts = [
            { name: "Stephen IssaH", phone: "0675319092", email: "stpne@gmail.com" },
            { name: "Amina Said", phone: "0775483139", email: "amunas@gmail.com" },
            { name: "Marcus Lee", phone: "0617852787", email: "marcus@gmail.com" },
        ];

        const tableBody = document.getElementById("contactsTable");
        const totalContacts = document.getElementById("totalContacts");
        const totalPhones = document.getElementById("totalPhones");
        const totalEmails = document.getElementById("totalEmails");
        const searchInput = document.getElementById("searchInput");
        const addContactButton = document.getElementById("addContactButton");

        const viewModal = document.getElementById("viewModal");
        const editModal = document.getElementById("editModal");
        const addModal = document.getElementById("addModal");
        const deleteModal = document.getElementById("deleteModal");

        const viewName = document.getElementById("viewName");
        const viewPhone = document.getElementById("viewPhone");
        const viewEmail = document.getElementById("viewEmail");

        const editName = document.getElementById("editName");
        const editPhone = document.getElementById("editPhone");
        const editEmail = document.getElementById("editEmail");
        const editForm = document.getElementById("editForm");

        const addName = document.getElementById("addName");
        const addPhone = document.getElementById("addPhone");
        const addEmail = document.getElementById("addEmail");
        const addForm = document.getElementById("addForm");

        const deleteMessage = document.getElementById("deleteMessage");

        let currentEditIndex = null;
        let currentDeleteIndex = null;
        let contacts = loadContacts();

        function loadContacts() {
            const raw = localStorage.getItem(storageKey);
            if (!raw) return [...defaultContacts];
            try {
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [...defaultContacts];
            } catch (error) {
                return [...defaultContacts];
            }
        }

        function saveContacts() {
            localStorage.setItem(storageKey, JSON.stringify(contacts));
        }

        function closeModal(id) {
            document.getElementById(id)?.close();
        }

        function openViewModal(index) {
            const contact = contacts[index];
            viewName.textContent = contact.name;
            viewPhone.textContent = contact.phone;
            viewEmail.textContent = contact.email;
            viewModal.setAttribute("open", "");
        }

        function openEditModal(index) {
            const contact = contacts[index];
            currentEditIndex = index;
            editName.value = contact.name;
            editPhone.value = contact.phone;
            editEmail.value = contact.email;
            editModal.setAttribute("open", "");
        }

        function openAddModal() {
            addForm.reset();
            addModal.setAttribute("open", "");
        }

        function openDeleteModal(index) {
            const contact = contacts[index];
            if (!contact) return;
            currentDeleteIndex = index;
            deleteMessage.textContent = `Delete ${contact.name} from your contacts?`;
            deleteModal.setAttribute("open", "");
        }

        function confirmDelete() {
            if (currentDeleteIndex === null) return;
            contacts.splice(currentDeleteIndex, 1);
            currentEditIndex = null;
            currentDeleteIndex = null;
            saveContacts();
            renderContacts();
            closeModal("deleteModal");
        }

        function renderContacts() {
            const query = searchInput.value.trim().toLowerCase();
            const visibleContacts = contacts
                .map((contact, index) => ({ ...contact, index }))
                .filter((contact) => {
                    if (!query) return true;
                    return (
                        contact.name.toLowerCase().includes(query) ||
                        contact.phone.toLowerCase().includes(query) ||
                        contact.email.toLowerCase().includes(query)
                    );
                });

            tableBody.innerHTML = visibleContacts
                .map((contact) => {
                    return `
                        <tr class="border-t border-main-200">
                            <td class="py-3 font-medium">${contact.name}</td>
                            <td class="py-3">${contact.phone}</td>
                            <td class="py-3">${contact.email}</td>
                            <td class="py-3 text-right space-x-2">
                                <button onclick="openViewModal(${contact.index})"
                                    class="rounded-full bg-blue-100 px-3 py-1 text-xs text-blue-700">
                                    <span class="sr-only">View</span>
                                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                                <button onclick="openEditModal(${contact.index})"
                                    class="rounded-full bg-yellow-100 px-3 py-1 text-xs text-yellow-700">
                                    <span class="sr-only">Edit</span>
                                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 20h9"></path>
                                        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
                                    </svg>
                                </button>
                                <button onclick="openDeleteModal(${contact.index})"
                                    class="rounded-full bg-red-100 px-3 py-1 text-xs text-red-700">
                                    <span class="sr-only">Delete</span>
                                    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 6h18"></path>
                                        <path d="M8 6V4h8v2"></path>
                                        <path d="M19 6l-1 14H6L5 6"></path>
                                        <path d="M10 11v6"></path>
                                        <path d="M14 11v6"></path>
                                    </svg>
                                </button>
                            </td>
                        </tr>
                    `;
                })
                .join("");

            totalContacts.textContent = contacts.length;
            totalPhones.textContent = contacts.filter((contact) => contact.phone).length;
            totalEmails.textContent = contacts.filter((contact) => contact.email).length;
        }

        editForm.addEventListener("submit", (event) => {
            event.preventDefault();
            if (currentEditIndex === null) return;

            contacts[currentEditIndex] = {
                name: editName.value.trim(),
                phone: editPhone.value.trim(),
                email: editEmail.value.trim(),
            };

            saveContacts();
            renderContacts();
            closeModal("editModal");
        });

        addForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const name = addName.value.trim();
            if (!name) return;

            contacts.push({
                name,
                phone: addPhone.value.trim(),
                email: addEmail.value.trim(),
            });

            saveContacts();
            renderContacts();
            closeModal("addModal");
        });

        searchInput.addEventListener("input", renderContacts);
        addContactButton.addEventListener("click", openAddModal);

        renderContacts();
    </script>

    <script type="module" src="../src/elements/layout/admin-dash-0/layout.js"></script>
    <script type="module" src="../src/elements/ui/app-modal.js"></script>
    <script type="module" src="../src/elements/ui/app-button.js"></script>
</body>

</html>
