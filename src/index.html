<!DOCTYPE html>
<html>

<head>
    <title>Web Component Button</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="tailwind.css">
</head>

<body>

    <app-button label="Save" rounded="none"></app-button>
    <app-button label="Delete" color="error" variant="solid" size="md" rounded="none"></app-button>
    <app-button label="Info" color="info" variant="outline" size="sm" rounded="full"></app-button>
    <app-button label="Accent" color="accent" variant="text" size="xl"></app-button>

    <user-avatar src="" alt="Stephen IssaH" size="60" status="online" rounded="full"></user-avatar>
    <user-avatar alt="Stephen IssaH" initials="SI" size="70" status="pending"></user-avatar>
    <user-avatar alt="Stephen IssaH" size="80" status="online" show-edit-button="true"></user-avatar>

    <script src="./elements/ui/app-buttom.js"></script>
    <!-- <script src="./elements/ui/user-avatar.js"></script> -->
</body>

</html>
